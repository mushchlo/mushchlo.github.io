<style>
*,
*:before,
*:after {
  -webkit-box-sizing: border-box;
  -moz-box-sizing: border-box;
  box-sizing: border-box;
}

* {
  position: relative;
  margin: 0;
  padding: 0;

  border: 0 none;
}

html,
body {
  width: 100%;
  height: 100%;

  background: #202027;

  font-family: 'Fjalla One', sans-serif;
  font-size: 18px;
}

h1 {
  padding-top: 40px;

  color: #ccc;
  text-align: center;
  font-size: 1.8rem;

    text-shadow: rgba(0,0,0,0.6) 1px 0, rgba(0,0,0,0.6) 1px 0, rgba(0,0,0,0.6) 0 1px, rgba(0,0,0,0.6) 0 1px;
}

.nav {
  margin: 20px auto;
  width: 455px;
  min-height: auto;
}

.nav ul {
  position: relative;
  padding-top: 20px;
}

.nav li {
  position: relative;
  padding: 20px 3px 0 3px;
  float: left;

  text-align: center;
  list-style-type: none;
}

.nav li::before, .nav li::after{
  content: '';
  position: absolute;
  top: 0;
  right: 50%;
  width: 50%;
  height: 20px;
  border-top: 1px solid #eee;
}

.nav li::after{
  left: 50%;
  right: auto;

  border-left: 1px solid #eee;
}

.nav li:only-child::after, .nav li:only-child::before {
  content: '';
  display: none;
}

.nav li:only-child{ padding-top: 0;}
.nav li:first-child::before, .nav li:last-child::after{
  border: 0 none;
}

.nav li:last-child::before{
  border-right: 1px solid #eee;
}

.nav ul ul::before{
  content: '';
  position: absolute; top: 0; left: 50%;
  border-left: 1px solid #ccc;
  width: 0;
  height: 20px;
}

.nav li a{
  display: inline-block;
  padding: 5px 10px;

  border: 1px solid #ccc;

  text-decoration: none;
  text-transform: uppercase;
  color: #ccc;
  font-family: arial, verdana, tahoma;
  font-size: 11px;
}
</style>
